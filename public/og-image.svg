<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#0ea5e9"/>

  <!-- Divider -->
  <line x1="570" y1="40" x2="570" y2="590" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ══ LEFT SIDE ══ -->

  <!-- House icon box -->
  <rect x="60" y="56" width="48" height="48" rx="10" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <path d="M67 73l9-7 9 7v11a2 2 0 0 1-2 2H69a2 2 0 0 1-2-2z" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="73 86 73 76 79 76 79 86" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- H1: Title -->
  <text x="60" y="168" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Mortgage Rates Tracker</text>

  <!-- Subcopy -->
  <text x="60" y="212" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" fill="#6b7280">Live 30-yr &amp; 15-yr rates · State market data · Forecasts</text>

  <!-- Rate card: 30-year -->
  <rect x="60" y="248" width="220" height="108" rx="10" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="80" y="278" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4b5563" letter-spacing="1">30-YEAR FIXED</text>
  <text x="80" y="336" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="700" fill="#10b981">6.9%</text>

  <!-- Rate card: 15-year -->
  <rect x="298" y="248" width="220" height="108" rx="10" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="318" y="278" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4b5563" letter-spacing="1">15-YEAR FIXED</text>
  <text x="318" y="336" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="700" fill="#0ea5e9">6.2%</text>

  <!-- Approximate disclaimer -->
  <text x="60" y="374" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4b5563">Approximate · Updated weekly from FRED</text>

  <!-- Feature bullets -->
  <circle cx="70" cy="416" r="3" fill="#0ea5e9"/>
  <text x="84" y="421" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#9ca3af">State buyer/seller market scores for all 50 states</text>

  <circle cx="70" cy="454" r="3" fill="#0ea5e9"/>
  <text x="84" y="459" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#9ca3af">30-day rate forecasts + payment impact</text>

  <circle cx="70" cy="492" r="3" fill="#0ea5e9"/>
  <text x="84" y="497" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#9ca3af">10-year historical rate charts</text>

  <!-- Footer: branding -->
  <text x="60" y="568" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="600" fill="#0ea5e9">irvinglopez.com/real-estate-market</text>
  <text x="60" y="594" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#374151">Data: FRED · Federal Reserve Bank of St. Louis</text>

  <!-- ══ RIGHT SIDE: Rate Chart ══ -->

  <!-- Chart area background -->
  <rect x="590" y="40" width="590" height="550" fill="#080808"/>

  <!-- Chart label -->
  <text x="620" y="75" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#4b5563" letter-spacing="0.5">30-YR &amp; 15-YR MORTGAGE RATE HISTORY</text>

  <!-- Grid lines (y-axis: 3%=490, 5%=346, 6%=274, 7%=202, 8%=130) -->
  <line x1="620" y1="130" x2="1155" y2="130" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="620" y1="202" x2="1155" y2="202" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="620" y1="274" x2="1155" y2="274" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="620" y1="346" x2="1155" y2="346" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="620" y1="418" x2="1155" y2="418" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="620" y1="490" x2="1155" y2="490" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Y-axis labels (right of divider, tight) -->
  <text x="615" y="134" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#374151" text-anchor="end">8%</text>
  <text x="615" y="206" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#374151" text-anchor="end">7%</text>
  <text x="615" y="278" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#374151" text-anchor="end">6%</text>
  <text x="615" y="350" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#374151" text-anchor="end">5%</text>
  <text x="615" y="422" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#374151" text-anchor="end">4%</text>
  <text x="615" y="494" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#374151" text-anchor="end">3%</text>

  <!--
    Rate to y: y = 490 - (rate - 3) * 72
    Time axis: x 630–1145 = 515px over 36 months ≈ 14.3px/month
    x(month) = 630 + month * 14.3

    30-yr data points (month, rate → x, y):
      0  Jan22  3.5%  → x=630,  y=454
      6  Jul22  5.8%  → x=716,  y=266
      12 Jan23  6.5%  → x=802,  y=218
      19 Aug23  7.2%  → x=902,  y=158
      22 Nov23  7.8%  → x=945,  y=115
      26 Mar24  7.0%  → x=1001, y=202
      32 Sep24  6.9%  → x=1087, y=209
      36 Jan25  6.9%  → x=1145, y=209

    15-yr data points:
      0  Jan22  2.9%  → x=630,  y=490  (floor)
      6  Jul22  5.1%  → x=716,  y=331
      12 Jan23  5.8%  → x=802,  y=274
      19 Aug23  6.5%  → x=902,  y=218
      22 Nov23  7.1%  → x=945,  y=165
      26 Mar24  6.3%  → x=1001, y=242
      32 Sep24  6.2%  → x=1087, y=250
      36 Jan25  6.2%  → x=1145, y=250
  -->

  <!-- 30-year fill area -->
  <path d="M630,454 C660,454 695,300 716,266 C737,232 770,225 802,218 C835,210 870,185 902,158 C920,144 934,110 945,115 C960,120 975,165 1001,202 C1030,238 1060,215 1087,209 C1110,204 1130,208 1145,209 L1145,490 L630,490 Z"
        fill="#10b981" fill-opacity="0.07"/>

  <!-- 30-year line -->
  <path d="M630,454 C660,454 695,300 716,266 C737,232 770,225 802,218 C835,210 870,185 902,158 C920,144 934,110 945,115 C960,120 975,165 1001,202 C1030,238 1060,215 1087,209 C1110,204 1130,208 1145,209"
        fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 15-year fill area -->
  <path d="M630,490 C660,490 695,355 716,331 C737,307 770,288 802,274 C835,260 870,238 902,218 C920,205 934,158 945,165 C960,172 975,215 1001,242 C1030,268 1060,256 1087,250 C1110,244 1130,248 1145,250 L1145,490 L630,490 Z"
        fill="#0ea5e9" fill-opacity="0.05"/>

  <!-- 15-year line -->
  <path d="M630,490 C660,490 695,355 716,331 C737,307 770,288 802,274 C835,260 870,238 902,218 C920,205 934,158 945,165 C960,172 975,215 1001,242 C1030,268 1060,256 1087,250 C1110,244 1130,248 1145,250"
        fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- End dots -->
  <circle cx="1145" cy="209" r="5" fill="#10b981"/>
  <circle cx="1145" cy="250" r="4" fill="#0ea5e9"/>

  <!-- End value labels -->
  <text x="1150" y="214" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#10b981" font-weight="600">6.9%</text>
  <text x="1150" y="255" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0ea5e9" font-weight="600">6.2%</text>

  <!-- X-axis labels -->
  <text x="626" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4b5563">2022</text>
  <text x="800" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4b5563">2023</text>
  <text x="978" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4b5563">2024</text>
  <text x="1120" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4b5563">2025</text>

  <!-- Legend -->
  <line x1="626" y1="545" x2="656" y2="545" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="641" cy="545" r="3" fill="#10b981"/>
  <text x="664" y="550" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">30-Year Fixed</text>

  <line x1="784" y1="545" x2="814" y2="545" stroke="#0ea5e9" stroke-width="2"/>
  <circle cx="799" cy="545" r="2.5" fill="#0ea5e9"/>
  <text x="822" y="550" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">15-Year Fixed</text>
</svg>
