      "@context": "https://schema.org",

          "@type": "WebApplication",
          "name": "Mortgage Rates Tracker",
          "description": "Track live 30-year and 15-year mortgage rates, state-level housing market conditions, affordability forecasts, and buyer vs. seller market scores — powered by Federal Reserve FRED data.",

          "isPartOf": {
            "@type": "WebSite",
            "name": "Irving Lopez",
            "url": "https://irvinglopez.com"
          },
          "creator": {
            "@type": "Person",
            "name": "Irving Lopez",
            "url": "https://irvinglopez.com"
          },
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is the current 30-year mortgage rate?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The current 30-year fixed mortgage rate is updated weekly from the Federal Reserve's FRED database (series MORTGAGE30US). Visit this tracker for the latest figure."
              }
            },
            {
              "@type": "Question",
              "name": "What is the current 15-year mortgage rate?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The current 15-year fixed mortgage rate is updated weekly from the Federal Reserve's FRED database (series MORTGAGE15US). Visit this tracker for the latest figure."
              }
            },
            {
              "@type": "Question",
              "name": "What is a seller's market in real estate?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "A seller's market occurs when housing demand exceeds supply — homes sell quickly, inventory is low, and prices rise. Sellers have more negotiating power and buyers often face competition."
              }
            },
            {
              "@type": "Question",
              "name": "What is a buyer's market in real estate?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "A buyer's market occurs when housing supply exceeds demand — homes sit on the market longer, inventory is high, and prices soften. Buyers have more negotiating leverage."
              }
            },
            {
              "@type": "Question",
              "name": "How is the market condition score calculated?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The market condition score combines four signals from FRED data: home price index growth, building permits, median days on market, and mortgage rate trends. The composite score ranges from -1 (strong buyer's market) to +1 (strong seller's market)."
              }
            }
          ]
        }
      ]
    }
    </script>
